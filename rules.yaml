version: "0.6-calendar"
mode: dry_run
locale: de-DE
timezone: Europe/Berlin

safety:
  default_mode: dry_run
  google_calendar_access: read_only
  google_calendar_write_requires:
    - --write-calendar
    - GOOGLE_CALENDAR_WRITE_ENABLED=true
  google_calendar_replace_requires:
    - --replace-auto-events
    - marker:NICO_DAY_PLANNER_AUTO
  never_modify_google_events_without_marker: NICO_DAY_PLANNER_AUTO
  todoist_access: read_only
  todoist_forbidden_actions:
    - modify_tasks
    - complete_tasks
    - move_tasks
    - delete_tasks
    - modify_labels
    - write_comments
  never_write_secrets_to_repo: true

planning_window:
  target_day: today_or_tomorrow
  start: "09:00"
  end: "23:00"

sources:
  default: json
  json:
    tasks_path: data/example_tasks.json
    calendar_path: data/example_calendar.json
  todoist:
    enabled: true
    access: read_only
    token_env_var: TODOIST_API_TOKEN
    fallback_source: json
  google_calendar:
    enabled: true
    read_access: read_only
    write_access: gated
    marker: NICO_DAY_PLANNER_AUTO
    write_enabled_env_var: GOOGLE_CALENDAR_WRITE_ENABLED

categories:
  - Werkstatt
  - Studio
  - ALEGRA
  - Haushalt
  - Privat
  - LIVE
  - Soundwerk
  - Buchhaltung

weekly_structure:
  monday:
    - title: Werkstatt Mengen
      start: "09:00"
      end: "17:00"
      location: Mengen
      categories: [Werkstatt]
  tuesday:
    - title: Werkstatt
      start: "09:00"
      end: "14:00"
      location: Mengen
      categories: [Werkstatt]
    # Soundwerk/Unterricht ist nur Orientierung; echte Termine kommen aus Google Calendar.
  wednesday:
    - title: Werkstatt
      start: "09:00"
      end: "14:00"
      location: Mengen
      categories: [Werkstatt]
    # Soundwerk/Unterricht ist nur Orientierung; echte Termine kommen aus Google Calendar.
  thursday:
    - title: Werkstatt
      start: "09:00"
      end: "12:00"
      location: Mengen
      categories: [Werkstatt]
    - title: ALEGRA/Producing Alex/Nico im Studio Aulendorf
      start: "14:00"
      end: "18:00"
      location: Aulendorf
      categories: [ALEGRA, Studio]
    - title: ALEGRA/Producing Alex/Nico im Studio Aulendorf
      start: "20:00"
      end: "23:00"
      location: Aulendorf
      categories: [ALEGRA, Studio]
  friday:
    - title: Werkstatt
      start: "09:00"
      end: "17:00"
      location: Mengen
      categories: [Werkstatt]
  saturday:
    flexible: true
  sunday:
    title: Frei / Haushalt / Büro
    categories: [Haushalt, Buchhaltung, Privat]

travel:
  Mengen_Aulendorf_minutes: 60
  blocks_time: true

prioritization:
  todoist_priority_order: [P1, P2, P3, P4]
  schedule_p1_first: true

capacity:
  max_free_time_planned_percent: 70
  max_main_tasks: 6
  max_mini_tasks: 2
  mini_task_max_minutes: 15
  include_daily_buffers: true
  default_buffer_minutes: 15
  werkstatt_diagnosis_reset_buffer_minutes: 15

estimation:
  estimate_missing_durations: true
  mark_estimates: true
  default_estimated_duration_minutes: 30
  long_task_threshold_minutes: 120
  long_task_action: propose_split_do_not_auto_schedule

category_rules:
  Werkstatt:
    diagnosis_preferred_windows: ["09:00-12:00", "13:00-18:00"]
    diagnosis_reset_buffer_minutes: 15
    avoid_late_night: true
  Buchhaltung:
    preferred_window: evening
    latest_end_time: "21:00"
    aliases: [Admin, Krankenkasse]
  Haushalt:
    prefer_gap_filler: true
    preferred_days: [sunday]
    preferred_max_block_minutes: 30
  Privat:
    protect_health_and_private_time: true
  Soundwerk:
    planning_only_in_hour_before_lesson: true
  Studio: {}
  ALEGRA: {}
  LIVE: {}

output:
  format: markdown
  include_sections:
    - assumptions
    - source_status
    - fixed_blocks
    - proposed_day_plan
    - buffers
    - not_scheduled
    - split_suggestions
  always_include_not_scheduled: true
